services:
  praison:
    build: .
    ports:
      - "24601:24601"
    environment:
      DB_HOST: database
      DB_NAME: praison
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      database:
        condition: service_healthy
    volumes:
      # Holds the encryption key, minted once on first start and reused after.
      - praison-data:/data
    restart: unless-stopped

  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: praison
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      # postgres:18 stores data under a version subdirectory of this path.
      - praison-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d praison"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  praison-data:
  praison-db:
