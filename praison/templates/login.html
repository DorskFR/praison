{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>praison</h1>
  <p class="meta">Sign in with your Praise server credentials.</p>
  {% if error %}<p class="banner error">⚠ {{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label class="field">Praise URL
      <input type="text" name="praise_url" placeholder="praise.example.com" autocomplete="url" required>
    </label>
    <label class="field">Email
      <input type="email" name="email" autocomplete="username" required>
    </label>
    <label class="field">Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button class="btn btn-primary" type="submit">Sign in</button>
  </form>
</div>
{% endblock %}
