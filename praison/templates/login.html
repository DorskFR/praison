{% extends "base.html" %}
{% block content %}
<div class="login">
  <h1>praison</h1>
  <p class="meta">Sign in with your Praise server credentials.</p>
  {% if error %}<p class="error">⚠ {{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>Praise URL
      <input type="text" name="praise_url" placeholder="praise.example.com" autocomplete="url" required>
    </label>
    <label>Email
      <input type="email" name="email" autocomplete="username" required>
    </label>
    <label>Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Sign in</button>
  </form>
</div>
{% endblock %}
