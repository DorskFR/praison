<div class="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2>Settings</h2>
      <button class="btn btn-icon" type="button" title="Close" data-action="close-modal">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <p class="meta">{{ user.praise_email }} @ {{ user.praise_url }}</p>
    {% if error %}<p class="banner error">⚠ {{ error }}</p>{% endif %}
    <form hx-post="/settings" hx-target="#content" hx-swap="innerHTML">
      <input type="hidden" name="year" value="{{ year }}">
      <input type="hidden" name="month" value="{{ month }}">
      <div class="plan-grid">
        <label class="field">Hours per day
          <input type="number" name="hours_per_day" min="1" max="24" step="1"
                 value="{{ user.hours_per_day }}" required></label>
        <label class="field">WFH hours per business day
          <input type="number" name="wfh_hours_per_business_day" min="0" max="24" step="0.5"
                 value="{{ user.wfh_hours_per_business_day }}" required></label>
      </div>
      <div class="plan-actions">
        <button class="btn" type="button" data-action="close-modal">Cancel</button>
        <button class="btn btn-primary" type="submit">Save</button>
      </div>
    </form>
  </div>
</div>
