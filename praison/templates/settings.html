{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Settings</h1>
  <p class="meta">{{ user.praise_email }} @ {{ user.praise_url }}</p>
  {% if error %}<p class="banner error">⚠ {{ error }}</p>{% endif %}
  <form method="post" action="/settings">
    <label class="field">Hours per day
      <input type="number" name="hours_per_day" min="1" max="24" step="1"
             value="{{ user.hours_per_day }}" required>
    </label>
    <label class="field">WFH hours per business day
      <input type="number" name="wfh_hours_per_business_day" min="0" max="24" step="0.5"
             value="{{ user.wfh_hours_per_business_day }}" required>
    </label>
    <button class="btn btn-primary" type="submit">Save</button>
  </form>
  <a class="btn btn-block" href="/">← Back to calendar</a>
</div>
{% endblock %}
