{% extends "base.html" %}
{% block content %}
<div class="login">
  <h1>Settings</h1>
  <p class="meta">{{ user.praise_email }} @ {{ user.praise_url }}</p>
  {% if error %}<p class="error">⚠ {{ error }}</p>{% endif %}
  <form method="post" action="/settings">
    <label>Hours per day
      <input type="number" name="hours_per_day" min="1" max="24" step="1"
             value="{{ user.hours_per_day }}" required>
    </label>
    <label>WFH hours per business day
      <input type="number" name="wfh_hours_per_business_day" min="0" max="24" step="0.5"
             value="{{ user.wfh_hours_per_business_day }}" required>
    </label>
    <button type="submit">Save</button>
  </form>
  <p class="meta"><a href="/">← back to calendar</a></p>
</div>
{% endblock %}
