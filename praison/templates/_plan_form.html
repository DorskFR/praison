<tr id="row-{{ day.isoformat() }}" class="plan-form">
  <td colspan="6">
    <form hx-post="/plan/{{ day.isoformat() }}" hx-target="#content" hx-swap="innerHTML">
      <p class="plan-title">Plan {{ day.strftime('%A %-d %b %Y') }}</p>
      <div class="plan-grid">
        <label class="field">Office hours
          <input type="text" name="office_hours" inputmode="decimal"
            value="{{ planned.office_minutes / 60 if planned and planned.office_minutes else '' }}" placeholder="8 or 7:30"></label>
        <label class="field">WFH hours
          <input type="text" name="wfh_hours" inputmode="decimal"
            value="{{ planned.remote_minutes / 60 if planned and planned.remote_minutes else '' }}" placeholder="1.5"></label>
        <label class="field">Leave
          <select name="leave">
            <option value="none">Working day</option>
            <option value="full" {% if planned and planned.is_paid_leave and not planned.is_half_day_leave %}selected{% endif %}>Paid leave (full day)</option>
            <option value="half" {% if planned and planned.is_half_day_leave %}selected{% endif %}>Paid leave (half day)</option>
            <option value="unpaid" {% if planned and planned.is_unpaid_leave %}selected{% endif %}>Unpaid leave</option>
          </select>
        </label>
        <label class="field plan-note">Note
          <input type="text" name="note" value="{{ planned.note if planned else '' }}" placeholder="optional"></label>
      </div>
      <p class="plan-hint">Leave (full or unpaid) clears the worked hours for the day.</p>
      <div class="plan-actions">
        <button class="btn btn-primary" type="submit">Save</button>
        {% if planned %}
        <button class="btn btn-danger" type="button" hx-delete="/plan/{{ day.isoformat() }}"
                hx-target="#content" hx-swap="innerHTML">Delete</button>
        {% endif %}
        <button class="btn" type="button" hx-get="/month/{{ day.year }}/{{ day.month }}/content"
                hx-target="#content" hx-swap="innerHTML">Cancel</button>
      </div>
    </form>
  </td>
</tr>
