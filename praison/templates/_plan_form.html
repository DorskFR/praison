<div class="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2>{{ day.strftime('%A %-d %b %Y') }}</h2>
      <button class="btn btn-icon" type="button" title="Close" data-action="close-modal">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <form hx-post="/plan/{{ day.isoformat() }}" hx-target="#content" hx-swap="innerHTML">
      <div class="plan-grid">
        <label class="field">Office hours
          <input type="text" name="office_hours" inputmode="text"
            value="{{ planned.office_minutes|dur if planned and planned.office_minutes else '' }}" placeholder="8:00 or 7:30"></label>
        <label class="field">WFH hours
          <input type="text" name="wfh_hours" inputmode="text"
            value="{{ planned.remote_minutes|dur if planned and planned.remote_minutes else '' }}" placeholder="1:30"></label>
        <label class="field plan-note">Leave
          <select name="leave">
            <option value="none">Working day</option>
            <option value="full" {% if planned and planned.is_paid_leave and not planned.is_half_day_leave %}selected{% endif %}>Paid leave (full day)</option>
            <option value="half" {% if planned and planned.is_half_day_leave %}selected{% endif %}>Paid leave (half day)</option>
            <option value="unpaid" {% if planned and planned.is_unpaid_leave %}selected{% endif %}>Unpaid leave</option>
          </select>
        </label>
        <label class="field plan-note">Note
          <input type="text" name="note" value="{{ planned.note if planned else '' }}" placeholder="optional"></label>
      </div>
      <p class="plan-hint">Full-day or unpaid leave clears the worked hours for the day.</p>
      <div class="plan-actions">
        <button class="btn" type="button" data-action="close-modal">Cancel</button>
        {% if planned %}
        <button class="btn btn-danger" type="button" hx-delete="/plan/{{ day.isoformat() }}"
                hx-target="#content" hx-swap="innerHTML">Delete</button>
        {% endif %}
        <button class="btn btn-primary" type="submit">Save</button>
      </div>
    </form>
  </div>
</div>
